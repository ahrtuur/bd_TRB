<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRB — Telas Rio Branco · Painel de Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- ============================ LOGIN ============================ -->
  <section id="login" class="login">
    <div class="login-card">
      <div class="brand brand--lg">
        <span class="brand-mark">TRB</span>
        <div>
          <strong>Telas Rio Branco</strong>
          <small>Painel de Pedidos</small>
        </div>
      </div>
      <label class="field">
        <span>Usuário</span>
        <input id="login-user" type="text" value="operador" autocomplete="username" />
      </label>
      <label class="field">
        <span>Senha</span>
        <input id="login-pass" type="password" value="••••••" autocomplete="current-password" />
      </label>
      <button class="btn btn--primary btn--block" id="login-btn">Entrar</button>
      <p class="login-hint">Demo — qualquer credencial entra.</p>
    </div>
  </section>

  <!-- ============================= APP ============================= -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">TRB</span>
        <div>
          <strong id="view-title">Painel de Pedidos</strong>
          <small>Telas Rio Branco</small>
        </div>
      </div>
      <button class="btn btn--ghost" id="logout-btn">Sair</button>
    </header>

    <!-- contadores por status -->
    <div class="stats" id="stats"></div>

    <!-- busca + filtros -->
    <div class="toolbar" id="toolbar">
      <div class="search">
        <svg viewBox="0 0 24 24" class="ico"><path d="M21 21l-4.3-4.3M11 19a8 8 0 110-16 8 8 0 010 16z"/></svg>
        <input id="search" type="search" placeholder="Buscar pedido..." />
      </div>
      <button class="btn btn--outline" id="open-filters">
        <svg viewBox="0 0 24 24" class="ico"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
        Filtros
      </button>
      <div class="view-toggle" id="view-toggle">
        <button data-mode="tabela" class="active">Tabela</button>
        <button data-mode="kanban">Kanban</button>
      </div>
      <button class="btn btn--primary" id="novo-pedido">+ Novo pedido</button>
    </div>

    <main id="content" class="content"></main>

    <!-- navegação inferior -->
    <nav class="bottomnav">
      <button data-view="pedidos" class="active">
        <svg viewBox="0 0 24 24" class="ico"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        <span>Pedidos</span>
      </button>
      <button data-view="producao">
        <svg viewBox="0 0 24 24" class="ico"><path d="M3 21V8l6-4 6 4v13M9 21v-6h2v6M15 12h6v9h-6"/></svg>
        <span>Produção</span>
      </button>
      <button data-view="entregas">
        <svg viewBox="0 0 24 24" class="ico"><path d="M3 7h11v8H3zM14 10h4l3 3v2h-7zM7 19a2 2 0 100-4 2 2 0 000 4zM18 19a2 2 0 100-4 2 2 0 000 4z"/></svg>
        <span>Entregas</span>
      </button>
      <button data-view="clientes">
        <svg viewBox="0 0 24 24" class="ico"><path d="M16 21v-2a4 4 0 00-8 0v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
        <span>Clientes</span>
      </button>
    </nav>
  </div>

  <!-- ====================== MODAL: DETALHE ======================= -->
  <div class="modal hidden" id="modal-detalhe">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <header class="modal-head">
        <h3 id="det-titulo">Pedido</h3>
        <button class="icon-btn" data-close>&times;</button>
      </header>
      <div class="modal-body" id="det-body"></div>
      <footer class="modal-foot">
        <button class="btn btn--ghost" data-close>Voltar</button>
        <button class="btn btn--primary" id="det-editar">Editar pedido</button>
      </footer>
    </div>
  </div>

  <!-- ===================== MODAL: FORMULÁRIO ===================== -->
  <div class="modal hidden" id="modal-form">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <header class="modal-head">
        <h3 id="form-titulo">Novo pedido</h3>
        <button class="icon-btn" data-close>&times;</button>
      </header>
      <form class="modal-body form-grid" id="pedido-form">
        <input type="hidden" id="f-numero" />
        <label class="field"><span>Código do cliente</span>
          <input id="f-codigo" list="clientes-list" required /></label>
        <datalist id="clientes-list"></datalist>
        <label class="field"><span>Nome do cliente</span>
          <input id="f-nome" /></label>
        <label class="field"><span>Tipo de tela</span>
          <input id="f-tipo" placeholder="Tela 5x3" required /></label>
        <label class="field"><span>Quantidade</span>
          <input id="f-qtd" type="number" step="0.01" min="0.01" value="1" required /></label>
        <label class="field"><span>Data do pedido</span>
          <input id="f-data-pedido" type="date" /></label>
        <label class="field"><span>Data da entrega</span>
          <input id="f-data-entrega" type="date" /></label>
        <label class="field"><span>Status</span>
          <select id="f-status"></select></label>
        <label class="field" id="f-maquina-wrap"><span>Máquina</span>
          <select id="f-maquina"></select></label>
      </form>
      <footer class="modal-foot">
        <button class="btn btn--ghost" data-close>Cancelar</button>
        <button class="btn btn--primary" id="form-salvar">Salvar</button>
      </footer>
    </div>
  </div>

  <!-- ======================= MODAL: FILTROS ====================== -->
  <div class="modal hidden" id="modal-filtros">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card modal-card--side">
      <header class="modal-head">
        <h3>Filtros</h3>
        <button class="icon-btn" data-close>&times;</button>
      </header>
      <div class="modal-body">
        <p class="field-label">Tipo de Tela</p>
        <div class="chips" id="filtro-tipos"></div>
        <label class="field"><span>Quantidade mínima</span>
          <input id="filtro-qtd" type="number" step="0.01" min="0" placeholder="XXXX" /></label>
        <label class="field"><span>Data de Início</span>
          <input id="filtro-inicio" type="date" /></label>
        <label class="field"><span>Data de Entrega</span>
          <input id="filtro-entrega" type="date" /></label>
      </div>
      <footer class="modal-foot">
        <button class="btn btn--ghost" id="filtro-limpar">Limpar</button>
        <button class="btn btn--primary" id="filtro-aplicar">Pesquisar</button>
      </footer>
    </div>
  </div>

  <div class="toast-wrap" id="toasts"></div>

  <script src="/js/data.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
