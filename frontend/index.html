<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRB — Telas Rio Branco · Painel de Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- ============================ LOGIN ============================ -->
  <section id="login" class="login">
    <div class="login-card">
      <div class="brand-logo brand-logo--dark">
        <span class="brand-trb">TRB</span>
        <span class="brand-sub">Telas<br>Rio Branco</span>
      </div>
      <label class="field"><span>Usuário</span>
        <input id="login-user" type="text" value="operador" autocomplete="username" /></label>
      <label class="field"><span>Senha</span>
        <input id="login-pass" type="password" value="123456" autocomplete="current-password" /></label>
      <button class="btn btn--green btn--block" id="login-btn">Entrar</button>
      <p class="login-hint">Demo — qualquer credencial entra.</p>
    </div>
  </section>

  <!-- ============================= APP ============================= -->
  <div id="app" class="app hidden">
    <!-- topo verde -->
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="brand-logo">
        <span class="brand-spark">✦</span>
        <span class="brand-trb">TRB</span>
        <span class="brand-sub">Telas<br>Rio Branco</span>
      </div>
    </header>

    <div class="layout">
      <!-- menu lateral -->
      <aside class="sidebar" id="sidebar">
        <nav>
          <button class="nav-item active" data-view="painel">
            <svg class="ico" viewBox="0 0 24 24"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z"/></svg>Painel</button>
          <button class="nav-item" data-view="pedidos">
            <svg class="ico" viewBox="0 0 24 24"><path d="M8 6h12M8 12h12M8 18h12M3.5 6h.01M3.5 12h.01M3.5 18h.01"/></svg>Pedidos</button>
          <button class="nav-item" data-view="producao">
            <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>Produção</button>
          <button class="nav-item" data-view="entregas">
            <svg class="ico" viewBox="0 0 24 24"><path d="M3 7h11v8H3zM14 10h4l3 3v2h-7zM7 19a2 2 0 100-4 2 2 0 000 4zM18 19a2 2 0 100-4 2 2 0 000 4z"/></svg>Entregas</button>
          <button class="nav-item" data-view="clientes">
            <svg class="ico" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-8 0v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>Clientes</button>
          <button class="nav-item" data-view="relatorios">
            <svg class="ico" viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Relatórios</button>
          <button class="nav-item" data-view="config">
            <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 00-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 00-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 000 2l-2 1.6 2 3.4 2.4-1a7 7 0 001.7 1l.4 2.5h4l.4-2.5a7 7 0 001.7-1l2.4 1 2-3.4-2-1.6c.1-.3.1-.7.1-1z"/></svg>Configurações</button>
        </nav>
        <button class="nav-item nav-sair" id="logout-btn">
          <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg>Sair</button>
      </aside>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

      <!-- conteúdo -->
      <main class="main" id="content"></main>
    </div>
  </div>

  <!-- ====================== MODAL: FORMULÁRIO ===================== -->
  <div class="modal hidden" id="modal-form">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <header class="modal-head">
        <h3 id="form-titulo">Novo pedido</h3>
        <button class="icon-btn" data-close>&times;</button>
      </header>
      <form class="modal-body form-grid" id="pedido-form">
        <input type="hidden" id="f-numero" />
        <label class="field"><span>Código do cliente</span>
          <input id="f-codigo" list="clientes-list" required /></label>
        <datalist id="clientes-list"></datalist>
        <label class="field"><span>Nome do cliente</span><input id="f-nome" /></label>
        <label class="field"><span>Tipo de tela</span>
          <input id="f-tipo" placeholder="Tela 5x3" required /></label>
        <label class="field"><span>Quantidade</span>
          <input id="f-qtd" type="number" step="0.01" min="0.01" value="1" required /></label>
        <label class="field"><span>Data do pedido</span><input id="f-data-pedido" type="date" /></label>
        <label class="field"><span>Data da entrega</span><input id="f-data-entrega" type="date" /></label>
        <label class="field"><span>Status</span><select id="f-status"></select></label>
        <label class="field" id="f-maquina-wrap"><span>Máquina</span><select id="f-maquina"></select></label>
      </form>
      <footer class="modal-foot">
        <button class="btn btn--ghost" data-close>Cancelar</button>
        <button class="btn btn--green" id="form-salvar">Salvar</button>
      </footer>
    </div>
  </div>

  <!-- ======================= MODAL: FILTROS ====================== -->
  <div class="modal hidden" id="modal-filtros">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card modal-card--side">
      <header class="modal-head"><h3>Filtros</h3><button class="icon-btn" data-close>&times;</button></header>
      <div class="modal-body">
        <p class="field-label">Tipo de Tela</p>
        <div class="check-grid" id="filtro-tipos"></div>
        <label class="field"><span>Quantidade mínima</span>
          <input id="filtro-qtd" type="number" step="0.01" min="0" placeholder="XXXX" /></label>
        <label class="field"><span>Data de Início</span><input id="filtro-inicio" type="date" /></label>
        <label class="field"><span>Data de Entrega</span><input id="filtro-entrega" type="date" /></label>
      </div>
      <footer class="modal-foot">
        <button class="btn btn--ghost" id="filtro-limpar">Limpar</button>
        <button class="btn btn--green" id="filtro-aplicar">Pesquisar</button>
      </footer>
    </div>
  </div>

  <div class="toast-wrap" id="toasts"></div>

  <script src="/js/data.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
